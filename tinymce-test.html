<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tinymce 测试页面</title>
    <script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/6/tinymce.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f8fafc;
        }
        .test-container {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            color: #1e293b;
            margin-top: 0;
        }
        .test-buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 8px 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #2563eb;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 4px;
            border-left: 4px solid #3b82f6;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h2>Tinymce 编辑器测试</h2>
        <p>测试Tinymce是否正常工作：</p>
        
        <textarea id="tinymce-test-editor"></textarea>
        
        <div class="test-buttons">
            <button onclick="getContent()">获取内容</button>
            <button onclick="setContent()">设置示例内容</button>
        </div>
        
        <div class="result" id="result"></div>
    </div>

    <script>
        // 初始化Tinymce
        tinymce.init({
            selector: '#tinymce-test-editor',
            height: 300,
            menubar: false,
            plugins: 'link image lists',
            toolbar: 'undo redo | bold italic underline strikethrough | bullist numlist | link image | removeformat',
            branding: false,
            placeholder: '在这里输入文本...'
        });

        function getContent() {
            const content = tinymce.get('tinymce-test-editor').getContent();
            document.getElementById('result').innerHTML = `
                <strong>获取的内容：</strong><br>
                <pre>${content}</pre>
                <strong>纯文本：</strong><br>
                <pre>${tinymce.get('tinymce-test-editor').getContent({format: 'text'})}</pre>
            `;
        }

        function setContent() {
            const exampleContent = `
                <h3>测试标题</h3>
                <p>这是一个<b>加粗</b>的段落。</p>
                <p>这是一个<i>斜体</i>的段落。</p>
                <ul>
                    <li>列表项1</li>
                    <li>列表项2</li>
                </ul>
            `;
            tinymce.get('tinymce-test-editor').setContent(exampleContent);
            document.getElementById('result').innerHTML = '<strong>已设置示例内容</strong>';
        }
    </script>
</body>
</html>
